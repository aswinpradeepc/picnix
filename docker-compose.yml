services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-picnix}
      POSTGRES_USER: ${POSTGRES_USER:-picnix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-picnix}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
      PHOENIX_ENABLE_AUTH: ${PHOENIX_ENABLE_AUTH:-false}
      PHOENIX_SECRET: ${PHOENIX_SECRET:-}
      PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD: ${PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD:-admin}
      PHOENIX_ENABLE_STRONG_PASSWORD_POLICY: ${PHOENIX_ENABLE_STRONG_PASSWORD_POLICY:-true}
      PHOENIX_CSRF_TRUSTED_ORIGINS: ${PHOENIX_CSRF_TRUSTED_ORIGINS:-}
    volumes:
      - phoenix-data:/mnt/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      OBSERVABILITY_ENABLED: "true"
      ARIZE_PRODUCT: phoenix
      ARIZE_PROJECT_NAME: picnix-vm
      OBSERVABILITY_CAPTURE_CONTENT: "true"
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006/v1/traces
      PHOENIX_API_KEY: ${PHOENIX_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-picnix}:${POSTGRES_PASSWORD:-picnix}@db:5432/${POSTGRES_DB:-picnix}
      LANGGRAPH_STRICT_MSGPACK: "true"
      # Tell the app where the credentials live inside the container
      GOOGLE_APPLICATION_CREDENTIALS: /app/adc.json
    ports:
      - "8501:8501"
    depends_on:
      phoenix:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Map your host's local ADC file directly to the container
      - ~/.config/gcloud/application_default_credentials.json:/app/adc.json:ro

# Top-level volumes block only holds named volumes
volumes:
  phoenix-data:
  postgres-data:
