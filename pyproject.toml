[project]
name = "picnix"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "langchain-core>=1.4.0",
    "langchain-google-vertexai>=3.2.3",
    "langgraph>=1.2.2",
    "pydeck>=0.9.2",
    "python-dotenv>=1.2.2",
    "requests>=2.34.2",
    "streamlit>=1.58.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
pythonpath = ["."]
